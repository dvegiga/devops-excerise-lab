name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r app/requirements.txt

      - name: Smoke test the app (no server needed)
        run: python -c "import app.app" || true

      - name: Build Docker image
        run: docker build -t devops-lab-app:${{ github.sha }} ./app

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push image
        run: |
          docker tag devops-lab-app:${{ github.sha }} ghcr.io/${{ github.repository_owner }}/devops-lab-app:latest
          docker push ghcr.io/${{ github.repository_owner }}/devops-lab-app:latest
